<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Corner</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #071021, #02030a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 380px;
    padding: 34px 28px; 
    border-radius: 22px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(0, 240, 255, 0.4);
    box-shadow:
        0 0 30px rgba(0,240,255,0.18),
        inset 0 0 25px rgba(0,240,255,0.08);
    text-align: center;
    overflow: hidden;
}

h1 {
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 2px;
    margin: 0;
    font-size: 26px;
    color: #00f0ff;
    text-shadow: 0 0 14px rgba(0,240,255,0.7);
}

.sub {
    margin-top: 6px;
    font-size: 13px;
    opacity: 0.75;
}

input {
    display: block;
    width: 100%;
    margin-top: 22px;
    padding: 13px 16px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: white;
    font-size: 15px;
    outline: none;
    box-sizing: border-box;   /* prevents overflow */
}

input:focus {
    border-color: #00f0ff;
    box-shadow: 0 0 8px rgba(0,240,255,0.6);
}

button {
    width: 100%;
    margin-top: 14px;
    padding: 13px;
    border-radius: 12px;
    border: none;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    color: white;
    background: linear-gradient(90deg,#00f0ff,#7a5cff);
    box-shadow: 0 0 12px rgba(0,240,255,0.7);
}

.hints {
    margin-top: 22px;
    font-size: 13px;
    line-height: 1.6;
    opacity: 0.85;
    background: rgba(255,255,255,0.04);
    padding: 12px 14px;
    border-radius: 10px;
    border-left: 3px solid #00f0ff;
}

.hints b { color: #00f0ff; }

#matrixCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    z-index: 1;
}

.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: none;
    background: rgba(0,0,0,0.45);
    display: flex;
    justify-content: center;
    align-items: center;
    visibility: hidden;
    z-index: 5;
}

.popup {
    padding: 26px 34px;
    border-radius: 16px;
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    letter-spacing: 1px;
    transform: scale(0.7);
    opacity: 0;
    transition: 0.25s ease;
    z-index: 10;
}

.overlay.show {
    visibility: visible;
}

.overlay.show .popup {
    transform: scale(1);
    opacity: 1;
}

/* POPUP ANIMATIONS */

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  50% { transform: translateX(6px); }
  75% { transform: translateX(-6px); }
  100% { transform: translateX(0); }
}

@keyframes pulseGlow {
  0% { box-shadow: 0 0 10px currentColor; }
  50% { box-shadow: 0 0 30px currentColor; }
  100% { box-shadow: 0 0 10px currentColor; }
}

@keyframes successPop {
  0% { transform: scale(0.7); }
  50% { transform: scale(1.12); }
  100% { transform: scale(1); }
}

/* ===== MOBILE RESPONSIVE FIX ===== */

html {
    -webkit-text-size-adjust: 100%;
}

.container {
    width: 100%;
    max-width: 380px;
}

/* prevent iphone zoom on input */
input, button {
    font-size: 16px;
}

/* small phones */
@media (max-width: 380px) {
    .container {
        padding: 26px 18px;
        border-radius: 18px;
    }

    h1 {
        font-size: 22px;
    }

    .sub {
        font-size: 12px;
    }

    input {
        padding: 11px 14px;
    }

    button {
        padding: 12px;
    }
}

/* very small screens (old android / iphone se) */
@media (max-width: 320px) {
    h1 {
        font-size: 20px;
        letter-spacing: 1px;
    }

    .container {
        padding: 22px 14px;
    }
}

/* large phones & tablets */
@media (min-width: 500px) {
    .container {
        max-width: 420px;
    }
}

/* iPhone notch safe area */
body {
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
}

</style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<div class="container">
    <h1>CYBER CORNER</h1>
    <div class="sub">Hack-Proof Arena</div>

    <input type="password" id="password" placeholder="Enter password">
    <button onclick="checkPassword()">SUBMIT</button>

    <div class="hints">
        <p><b>⚠ Special Hint:</b> Only those who understand our battleground earn a place among legends.</p>
        <p><b>Hint:</b> Not length alone, not symbols alone… true strength blends identity with security.</p>
    </div>
</div>

<div id="overlay" class="overlay">
    <div id="popup" class="popup"></div>
</div>

<script>
function playCelebration() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    const sequence = [523, 659, 784, 988, 1318]; // victory melody

    sequence.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = "sine";
        osc.frequency.value = freq;

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start(ctx.currentTime + i * 0.12);
        gain.gain.setValueAtTime(0.25, ctx.currentTime + i * 0.12);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.35);

        osc.stop(ctx.currentTime + i * 0.12 + 0.35);
    });
}

function playSuccessSound(){
    const ctx=new AudioContext();
    [660,880,990].forEach((f,i)=>{
        const o=ctx.createOscillator();
        const g=ctx.createGain();
        o.frequency.value=f;
        o.connect(g);
        g.connect(ctx.destination);
        o.start(ctx.currentTime+i*0.08);
        g.gain.setValueAtTime(0.15,ctx.currentTime+i*0.08);
        o.stop(ctx.currentTime+i*0.08+0.15);
    });
}

function playModerateSound(){
    const ctx=new AudioContext();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.frequency.value=440;
    o.type="sine";
    o.connect(g);
    g.connect(ctx.destination);
    o.start();
    g.gain.setValueAtTime(0.1,ctx.currentTime);
    o.stop(ctx.currentTime+0.25);
}

function playWeakSound(){
    const ctx=new AudioContext();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.type="sawtooth";
    o.frequency.value=160;
    o.connect(g);
    g.connect(ctx.destination);
    o.start();
    g.gain.setValueAtTime(0.2,ctx.currentTime);
    o.stop(ctx.currentTime+0.3);
}

let matrixInterval;

function startMatrixRain() {
    const canvas = document.getElementById("matrixCanvas");
    const ctx = canvas.getContext("2d");

    canvas.style.display = "block";
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const letters = "01CYBERSECURE";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    clearInterval(matrixInterval);

    matrixInterval = setInterval(() => {

        // trail effect (NOT blur)
        ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#00ff9c";
        ctx.font = fontSize + "px monospace";

        for (let i = 0; i < drops.length; i++) {
            const text = letters[Math.floor(Math.random() * letters.length)];

            ctx.fillText(text, i * fontSize, drops[i] * fontSize);

            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
                drops[i] = 0;

            drops[i]++;
        }
    }, 33);
}

window.addEventListener("resize", () => {
    const canvas = document.getElementById("matrixCanvas");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

function stopMatrixRain(){
    document.getElementById("matrixCanvas").style.display="none";
    clearInterval(matrixInterval);
}

function showPopup(message,color,type="normal"){
    const overlay=document.getElementById("overlay");
    const popup=document.getElementById("popup");

    popup.innerHTML=message;
    popup.style.background=color;
    popup.style.color="#fff";
    popup.style.boxShadow="0 0 25px "+color;
    popup.style.animation="";

    overlay.classList.add("show");

    if(type==="hall"){
        playCelebration();
        startMatrixRain();
        popup.style.animation="successPop 0.4s ease";
    }
    else if(type==="strong"){
        playSuccessSound();
        popup.style.animation="successPop 0.35s ease, pulseGlow 1.2s infinite";
    }
    else if(type==="moderate"){
        playModerateSound();
        popup.style.animation="pulseGlow 1.4s infinite";
    }
    else if(type==="weak"){
        playWeakSound();
        popup.style.animation="shake 0.4s";
    }

    setTimeout(()=>{
        overlay.classList.remove("show");
        stopMatrixRain();
        popup.style.animation="";
    },2500);
}

function checkPassword(){
    let pwd=document.getElementById("password").value;

    const cyberKeywords=["cyber","hack","secure","shield","encrypt","firewall","arena","corner","protect","defend","cipher"];
    const hallOfFame=["cybercorner","hackproofarena","sarvam"];

    let hasCapital=/[A-Z]/.test(pwd);
    let hasNumber=/[0-9]/.test(pwd);
    let hasSpecial=/[!@#$%^&*]/.test(pwd);
    let hasKeyword=cyberKeywords.some(k=>pwd.toLowerCase().includes(k));
    let hallMatch=hallOfFame.some(h=>pwd.toLowerCase().includes(h));

   if(hallMatch){
    showPopup("🏆 HALL OF FAME WORTHY","#020617","hall");
}
else if(hasKeyword && pwd.length>=8 && hasCapital && hasNumber && hasSpecial){
    showPopup("💪 STRONG PASSWORD","#00ff9c","strong");
}
else if(pwd.length>=8 && hasCapital && hasNumber && hasSpecial){
    showPopup("👍 MODERATE PASSWORD","#ff9f1c","moderate");
}
else{
    showPopup("⚠ WEAK PASSWORD","#ff3b3b","weak");
}
}
</script>

</body>
</html>
