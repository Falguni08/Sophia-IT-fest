<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Security Password Test</title>

<style>

*{
    box-sizing: border-box;
}

body {
    margin: 0;
    background: radial-gradient(circle at center, #02020a, #000);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: white;
}

/* MAIN BOX */
.box {
    text-align: center;
    padding: 26px;
    border-radius: 14px;
    width: 92%;
    max-width: 360px;
    background: rgba(10,10,25,0.95);
    box-shadow: 0 0 18px cyan, 0 0 35px blue inset;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { box-shadow: 0 0 12px cyan; }
    to { box-shadow: 0 0 28px #00ffff; }
}

h2 {
    color: #00ffff;
    letter-spacing: 1px;
    margin-bottom: 4px;
    font-size: 22px;
}

p {
    margin-top: 0;
    opacity: 0.75;
    font-size: 13px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin-top: 14px;
    border-radius: 7px;
    border: none;
    outline: none;
    background: #111;
    color: #0ff;
    text-align: center;
    font-size: 15px;
}

/* BUTTON */
button {
    margin-top: 16px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 9px;
    background: linear-gradient(to right, cyan, purple);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.25s;
    font-size: 15px;
}

button:hover {
    transform: scale(1.04);
}

#result {
    margin-top: 18px;
    font-size: 18px;
    font-weight: bold;
}

.hint {
    margin-top: 12px;
    font-size: 12px;
    color: #00ffff;
    font-style: italic;
    opacity: 0.8;
    line-height: 1.35;
}

/* scan animation */
.scan {
    animation: scanGlow 0.4s ease-in-out 2;
}

@keyframes scanGlow {
    0% { transform: scale(1); }
    50% { transform: scale(1.06); }
    100% { transform: scale(1); }
}

/* EXTRA SMALL PHONES */
@media (max-width: 360px) {
    .box {
        padding: 20px;
        max-width: 300px;
    }

    h2 { font-size: 20px; }
    #result { font-size: 16px; }
}

</style>
</head>

<body>

<div class="box" id="box">
    <h2>🔐 CYBER SECURITY TEST</h2>
    <p>Analyze password strength</p>

    <input type="text" id="password" placeholder="Enter password">
    <button onclick="checkStrength()">SCAN</button>

    <div id="result"></div>

    <div class="hint">
        💡 Not length alone, not symbols alone… true strength blends identity with security.
    </div>
</div>

<script>

let keywords = [
    "cyber","secure","encrypt","firewall","malware",
    "phishing","shield","protect","netdefense","cyberwall",
    "hacker","access","root","admin","system",
    "india","bharat","queen","king","love",
    "power","winner","champion","success",
    "future","dream","legend","hero","tiger"
];

function checkStrength() {

    let pass = document.getElementById("password").value;
    let lower = pass.toLowerCase();
    let result = document.getElementById("result");
    let box = document.getElementById("box");

    let hasKeyword = keywords.some(word => lower.includes(word));

    let hasLength = pass.length >= 8;
    let hasUpper = /[A-Z]/.test(pass);
    let hasNumber = /[0-9]/.test(pass);
    let hasSpecial = /[!@#$%^&*]/.test(pass);

    result.classList.remove("scan");
    box.classList.remove("scan");

    if(hasKeyword && hasLength && hasUpper && hasNumber && hasSpecial){
        result.innerHTML = "🟩 STRONG PASSWORD 🔐";
        result.style.color = "#00ffcc";
        box.style.boxShadow = "0 0 22px lime, 0 0 50px green inset";
    }
    else if(hasLength && hasUpper && hasNumber && hasSpecial){
        result.innerHTML = "🟧 MODERATE PASSWORD";
        result.style.color = "orange";
        box.style.boxShadow = "0 0 22px orange, 0 0 50px darkorange inset";
    }
    else{
        result.innerHTML = "🟥 WEAK PASSWORD";
        result.style.color = "red";
        box.style.boxShadow = "0 0 22px red, 0 0 50px darkred inset";
    }

    result.classList.add("scan");
    box.classList.add("scan");
}
</script>

</body>
</html>
